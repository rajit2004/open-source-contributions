# .github/workflows/update_contributions.yml
# Place in: rajit2004/open-source-contributions/.github/workflows/

name: Update Contributions

on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours
  workflow_dispatch:          # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run contribution tracker
        run: python .github/update_contributions.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "🤝 Auto-update contributions"
          git push
